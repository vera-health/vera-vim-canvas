<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #222831 0%, #0B131F 100%);
    }

    #app-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.3s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading img {
      width: 48px;
      height: 48px;
      border-radius: 12px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-top-color: #2DD4BF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #error {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }

    #error.visible {
      display: flex;
    }

    #error p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      line-height: 1.5;
    }

    #error button {
      padding: 10px 24px;
      background: #2DD4BF;
      color: #0B131F;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    #error button:hover {
      background: #5EEAD4;
    }
  </style>
</head>
<body>
  <div id="loading">
    <img src="icons/icon-128.png" alt="Vera">
    <div class="spinner"></div>
  </div>

  <div id="error">
    <img src="icons/icon-128.png" alt="Vera" style="width:48px;height:48px;border-radius:12px;">
    <p>Unable to connect to Vera. Please check your internet connection and try again.</p>
    <button id="retry-btn">Retry</button>
  </div>

  <iframe
    id="app-frame"
    src="https://vera-vim-canvas.vercel.app/standalone"
    allow="microphone"
  ></iframe>

  <script>
    const frame = document.getElementById("app-frame");
    const loading = document.getElementById("loading");
    const error = document.getElementById("error");
    const retryBtn = document.getElementById("retry-btn");

    frame.addEventListener("load", () => {
      loading.classList.add("hidden");
    });

    frame.addEventListener("error", () => {
      loading.classList.add("hidden");
      error.classList.add("visible");
    });

    retryBtn.addEventListener("click", () => {
      error.classList.remove("visible");
      loading.classList.remove("hidden");
      frame.src = frame.src;
    });

    // Fallback: if iframe hasn't loaded after 15s, show error
    setTimeout(() => {
      if (!loading.classList.contains("hidden")) {
        loading.classList.add("hidden");
        error.classList.add("visible");
      }
    }, 15000);
  </script>
</body>
</html>
